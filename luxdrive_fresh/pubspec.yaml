name: luxdrive
description: A premium luxury car browsing app
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0

  # Navigation
  go_router: ^12.1.3

  # UI & Animations
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.0.0
  animated_text_kit: ^4.2.2

  # Icons & Fonts
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Storage
  shared_preferences: ^2.2.2

  # Currency
  intl: ^0.19.0
  collection: ^1.18.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/cars/
    - assets/images/
